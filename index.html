<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Route Ledger</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="background-orb orb-a"></div>
  <div class="background-orb orb-b"></div>
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Driver operations control</p>
        <h1>Route Ledger</h1>
      </div>
      <div class="topbar-side">
        <div id="auth-meta" class="auth-meta"></div>
        <div id="user-actions"></div>
      </div>
    </header>
    <nav id="page-nav" class="page-nav"></nav>
    <main id="app"></main>
  </div>
  <script>
    (() => {
      const host = window.location.hostname || "";
      const isLanHost = /^(10\.|192\.168\.|172\.(1[6-9]|2\d|3[0-1])\.)/.test(host);
      const isLocalHost = host === "localhost" || host === "127.0.0.1" || host === "::1" || host.endsWith(".local");

      if (!(isLocalHost || isLanHost) || !("EventSource" in window)) {
        return;
      }

      const source = new EventSource("/__live-reload");
      let refreshTimer = 0;

      source.addEventListener("reload", () => {
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(() => {
          window.location.reload();
        }, 120);
      });
    })();
  </script>
</body>
</html>
